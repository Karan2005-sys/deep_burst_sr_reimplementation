experiment_name: synthetic_smoke
output_dir: outputs/smoke_run
seed: 42
device: cpu
task: synthetic
dataset_type: synthetic_rgb

dataset:
  scale: 4
  burst_size: 4
  train_split: train
  val_split: val
  crop_size: 32
  max_translation: 1.0
  max_rotation_deg: 0.2
  shot_noise: 0.0
  read_noise: 0.0
  deterministic_val: true

model:
  in_channels: 4
  base_channels: 16
  embed_dim: 32
  encoder_blocks: 1
  decoder_blocks_lowres: 1
  decoder_blocks_highres: 1
  fusion_proj_dim: 16
  flow_feature_dim: 8
  scale: 4
  flow_backend: farneback

train:
  epochs: 1
  batch_size: 1
  num_workers: 0
  lr: 0.0001
  weight_decay: 0.0
  grad_clip_norm: 1.0
  amp: false
  log_interval: 1
  save_interval: 1

loss:
  type: l1

eval:
  batch_size: 1
